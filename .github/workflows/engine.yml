# CPython engine CI -- the OSS core, the bulk of the test pyramid.
#
# Realizes the design doc's CI matrix ("Python on Linux") and the tiered-test
# model: this job runs the cheap, headless unit + integration tests on every
# push/PR. Heavy backends (open3d/pye57/opencv) and live tests are NOT run here.
name: engine

on:
  push:
    paths:
      - "engine/**"
      - ".github/workflows/engine.yml"
  pull_request:
    paths:
      - "engine/**"
      - ".github/workflows/engine.yml"

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: engine-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: engine (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: engine/pyproject.toml

      - name: Install engine (dev + report extras)
        # Core deps are light by design; dev brings ruff/mypy/pytest/pytest-cov,
        # report brings jinja2. The heavy extra is deliberately omitted so unit
        # CI stays fast and portable.
        run: pip install -e "engine[dev,report]"

      - name: Ruff lint
        run: ruff check engine

      - name: Ruff format check
        run: ruff format --check engine

      - name: mypy (non-blocking)
        # Young codebase: type errors are surfaced but do not fail the build yet.
        # Tighten by removing continue-on-error once the engine stabilizes.
        continue-on-error: true
        working-directory: engine
        run: mypy

      - name: pytest (headless, not heavy)
        # Excludes the `heavy` marker so no optional native backend is required.
        working-directory: engine
        run: pytest -q -m "not heavy" --cov=ca_elevation_engine
