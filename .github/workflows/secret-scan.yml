# Secret scanning in CI (not just the bypassable local pre-commit hook).
# Runs gitleaks over the repo on every push and PR, with NO path filter, using
# the repo's .gitleaks.toml allowlist. This is the enforced gate; the pre-commit
# gitleaks hook is the fast local mirror.
name: secret-scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the scan covers all commits on the ref
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
