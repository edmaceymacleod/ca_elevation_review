# Schema / structure validation -- design principle #3.
#
# Validates that the engine's JSON Schemas are themselves valid draft-07 schemas
# and that every discovered fixture payload validates against the matching
# schema, fail-closed. A malformed manifest / capture package / verdict report
# fails the build rather than the field.
name: schema-validation

on:
  push:
    paths:
      - "engine/src/ca_elevation_engine/schemas/**"
      - "engine/fixtures/**"
      - "engine/tools/validate_schemas.py"
      - ".github/workflows/schema-validation.yml"
  pull_request:
    paths:
      - "engine/src/ca_elevation_engine/schemas/**"
      - "engine/fixtures/**"
      - "engine/tools/validate_schemas.py"
      - ".github/workflows/schema-validation.yml"

concurrency:
  group: schema-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: validate schemas + fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        # The validator only needs jsonschema (a core engine dependency).
        run: pip install -e "engine"

      - name: Validate JSON Schemas and fixtures
        run: python engine/tools/validate_schemas.py -v
