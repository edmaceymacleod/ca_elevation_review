# CI for the pyRevit extension's testable lib (ca_elevation_revit).
#
# Two job groups, both on ubuntu (the lib is pure stdlib; Revit-touching code is
# function-local and never executed here):
#   * floor  (3.8 + 3.9): engine-free lib tests + ruff(py38) + mypy. Does NOT
#     install the engine -- the hard gate is the engine's requires-python>=3.10,
#     so this is what makes the 3.8 syntax floor executable rather than asserted.
#   * engine (3.10/3.11/3.12): installs ./engine[report] and runs the full suite,
#     including the SpecManifest round-trip, the verdict ratchet, and the real-CLI
#     integration tests.
#
# Branch protection should require the single `all-green` aggregator, not each leg.
name: pyrevit-extension

on:
  push:
    paths:
      - "pyrevit-extension/**"
      - ".github/workflows/pyrevit-extension.yml"
  pull_request:
    paths:
      - "pyrevit-extension/**"
      - ".github/workflows/pyrevit-extension.yml"

concurrency:
  group: pyrevit-extension-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: pyrevit-extension

jobs:
  floor:
    name: floor (py${{ matrix.python }} - no engine)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.8", "3.9"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install floor toolchain (capped; NO engine)
        run: pip install -r tests/requirements-floor.txt
      - name: Ruff lint (target py38)
        run: ruff check --config tests/pyproject.toml CaElevationReview.extension/lib tests
      - name: Ruff format check
        run: ruff format --check --config tests/pyproject.toml CaElevationReview.extension/lib tests
      - name: Mypy (lib, py3.8)
        run: mypy --config-file tests/pyproject.toml CaElevationReview.extension/lib
      - name: Pytest (engine-free tests only)
        working-directory: pyrevit-extension/tests
        run: pytest -q -m "not engine"

  engine:
    name: engine (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with engine.yml's matrix (3.10/3.11/3.12).
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install lib test deps + the engine ([report] for real PDF)
        run: pip install pytest "./engine[report]"
      - name: Engine must import (hard gate, not importorskip)
        run: python -c "import ca_elevation_engine; print(ca_elevation_engine.__version__)"
      - name: Pytest (full suite incl. engine + integration)
        working-directory: pyrevit-extension/tests
        run: pytest -q

  all-green:
    name: pyrevit-extension / all-green
    runs-on: ubuntu-latest
    needs: [floor, engine]
    if: always()
    steps:
      - name: Fail if any required job failed
        run: |
          if [ "${{ needs.floor.result }}" != "success" ] || [ "${{ needs.engine.result }}" != "success" ]; then
            echo "floor=${{ needs.floor.result }} engine=${{ needs.engine.result }}"
            exit 1
          fi
          echo "all green"
