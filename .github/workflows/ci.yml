# Single-gate CI.
#
# Replaces the six per-component path-filtered workflows. This one workflow
# ALWAYS runs (no top-level path filter), so the final `all-green` job always
# reports a status -- which means it can be the ONE required check in branch
# protection without the "required check stuck pending forever" problem that
# path-filtered required checks suffer from.
#
# A `changes` job (dorny/paths-filter) decides which component jobs run; each
# component job is conditioned on its filter. `all-green` waits for them all and
# fails if any GATING job failed (skipped is fine). The Revit add-in is
# non-gating by design (no Revit API assemblies on hosted runners).
#
# Required check to configure in Settings -> Branches: "CI / all-green".
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      engine: ${{ steps.filter.outputs.engine }}
      pyrevit: ${{ steps.filter.outputs.pyrevit }}
      schema: ${{ steps.filter.outputs.schema }}
      ios: ${{ steps.filter.outputs.ios }}
      revit: ${{ steps.filter.outputs.revit }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            engine:
              - 'engine/**'
              - '.github/workflows/ci.yml'
            pyrevit:
              - 'pyrevit-extension/**'
              - 'engine/**'
              - '.github/workflows/ci.yml'
            schema:
              - 'engine/src/ca_elevation_engine/schemas/**'
              - 'engine/fixtures/**'
              - 'engine/tools/validate_schemas.py'
              - 'engine/tools/regen_fixtures.py'
              - '.github/workflows/ci.yml'
            ios:
              - 'ios-app/**'
              - '.github/workflows/ci.yml'
            revit:
              - 'revit-addin/**'
              - '.github/workflows/ci.yml'

  # --- Engine: ruff + format + mypy (blocking) + pytest, on 3.10/3.11/3.12 ---
  engine:
    name: engine (py${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.engine == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: engine/pyproject.toml
      - run: pip install -c engine/requirements-dev.txt -e "engine[dev,report]"
      - name: Ruff lint
        run: ruff check engine
      - name: Ruff format check
        run: ruff format --check engine
      - name: mypy
        working-directory: engine
        run: mypy
      - name: pytest (headless, not heavy)
        working-directory: engine
        run: pytest -q -m "not heavy" --cov=ca_elevation_engine

  # --- pyRevit lib: 3.8/3.9 floor jobs (engine NOT installed) ---------------
  pyrevit_floor:
    name: pyrevit floor (py${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.pyrevit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install floor toolchain (capped; NO engine)
        run: pip install -r pyrevit-extension/tests/requirements-floor.txt
      - name: Ruff lint (py38)
        working-directory: pyrevit-extension
        run: ruff check --config tests/pyproject.toml CaElevationReview.extension/lib tests
      - name: Ruff format check
        working-directory: pyrevit-extension
        run: ruff format --check --config tests/pyproject.toml CaElevationReview.extension/lib tests
      - name: Mypy (lib, py3.8)
        working-directory: pyrevit-extension
        run: mypy --config-file tests/pyproject.toml CaElevationReview.extension/lib
      - name: Pytest (engine-free tests only)
        working-directory: pyrevit-extension/tests
        run: pytest -q -m "not engine"

  # --- pyRevit lib: 3.10/3.11/3.12 engine jobs (engine installed) -----------
  pyrevit_engine:
    name: pyrevit engine (py${{ matrix.python-version }})
    needs: changes
    if: needs.changes.outputs.pyrevit == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Keep in sync with the engine job's matrix.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install lib test deps + the engine ([report] for real PDF)
        run: pip install -c engine/requirements-dev.txt pytest "./engine[report]"
      - name: Engine must import (hard gate, not importorskip)
        run: python -c "import ca_elevation_engine; print(ca_elevation_engine.__version__)"
      - name: Pytest (full suite incl. engine + integration)
        working-directory: pyrevit-extension/tests
        run: pytest -q

  # --- Schemas + fixtures validate (fail-closed) ----------------------------
  schema:
    name: validate schemas + fixtures
    needs: changes
    if: needs.changes.outputs.schema == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -c engine/requirements-dev.txt -e "engine"
      - name: Schema + fixture validation (strict)
        run: python engine/tools/validate_schemas.py -v --strict-unknown
      - name: Fixture/golden drift guard (re-run seeders, assert no diff)
        run: python engine/tools/regen_fixtures.py --check

  # --- iOS: build/test the pure kit (blocks); SwiftLint gates (--strict) ------
  ios_kit:
    name: CaElevationKit (macos)
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - name: swift build
        working-directory: ios-app
        run: swift build
      - name: swift test
        working-directory: ios-app
        run: swift test
      # Foundation-only guard (the LOAD-BEARING portability check): the kit and
      # its pure support targets (Fixtures, cek-emit) must never import
      # UIKit/SwiftUI/ARKit/etc. A flat grep -- not a compile -- is what enforces
      # the invariant: it catches a `#if canImport(ARKit)`-guarded import that a
      # Linux/Windows compile silently skips, and it gates here on macOS where the
      # toolchain always runs. Keep the dir list in sync with Package.swift's
      # Foundation-only targets.
      - name: Foundation-only import guard (kit)
        working-directory: ios-app
        run: |
          if grep -rnE '^[[:space:]]*(@testable[[:space:]]+)?import[[:space:]]+(UIKit|SwiftUI|ARKit|RealityKit|CoreLocation|AVFoundation|CoreMotion|Vision|AppKit)([^A-Za-z0-9_]|$)' Sources/CaElevationKit Sources/CaElevationFixtures Sources/cek-emit; then
            echo "::error::Foundation-only targets must not import UIKit/SwiftUI/ARKit/etc (offending import above)"; exit 1
          fi
          echo "Foundation-only targets import only Foundation / CaElevationKit."
      # SwiftLint is not preinstalled on current macos-latest images, so install
      # it explicitly -- otherwise the gating step below fails with
      # "swiftlint: command not found".
      - name: Install SwiftLint
        run: brew install swiftlint
      # SwiftLint GATES: the repo is clean, so any violation (new or otherwise)
      # fails the job. --strict promotes warnings to errors so nothing slips
      # through as a non-failing warning.
      - name: SwiftLint (gating)
        working-directory: ios-app
        run: swiftlint lint --strict --config .swiftlint.yml

  # --- iOS: build/test the pure kit on Linux (cross-toolchain portability) ----
  #
  # Compiles + tests CaElevationKit (and its pure support targets) on the
  # official Swift Linux toolchain, in a pinned container so there is no
  # third-party setup-swift action to drift. This is the cheap, stable
  # cross-platform leg Package.swift already claims ("builds on Linux for CI"):
  # non-Apple-framework leakage that happens to compile on macOS (e.g.
  # SwiftUI/CoreLocation) fails to compile here. GATES alongside ios_kit.
  ios_kit_linux:
    name: CaElevationKit (linux)
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container: swift:6.0
    steps:
      - uses: actions/checkout@v7
      - run: swift --version
      - name: swift build
        working-directory: ios-app
        run: swift build
      - name: swift test
        working-directory: ios-app
        run: swift test

  # --- iOS: build/test the pure kit on Windows (INFORMATIONAL, additive) ------
  #
  # ADDITIVE portability coverage: proves CaElevationKit keeps building on the
  # Windows MSVC toolchain. NON-GATING by design -- it is NOT in all-green's
  # needs/R map, AND it uses job-level `continue-on-error` so a Windows-only flake
  # never fails the CI *workflow* (which would otherwise block owner auto-merge for
  # every iOS PR, not just gate all-green). The real Foundation-only enforcement
  # is the grep guard in ios_kit + the gating Linux leg (ios_kit_linux); this is
  # purely additive. Pinned to windows-2022 (VS 2022 + Swift 6.3.2 -- the env
  # verified locally via ios-app/scripts/win-kit-test.ps1). To promote to gating
  # once proven stable: add it to all-green's needs AND R map in ONE commit.
  ios_kit_windows:
    name: CaElevationKit (windows)
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: windows-2022
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      # Swift is not preinstalled on the Windows image; install + cache it.
      - uses: SwiftyLab/setup-swift@v1.14.0
        with:
          swift-version: "6.3.2"
      # MSVC linker + Windows SDK -- without an active VS dev env `swift build`
      # fails to find `link`. SHA-pinned (v1.13.0): this is the action most exposed
      # to Windows-image drift, so it is not floated on @v1.
      - uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756
        with:
          arch: x64
      # The Swift Windows toolchain needs SDKROOT (win-kit-test.ps1 hand-sets it).
      # setup-swift MAY already export it; log it, and fall back if it is unset.
      - name: Swift env diagnostic (+ SDKROOT fallback)
        shell: pwsh
        run: |
          Write-Host "SDKROOT=$env:SDKROOT"
          if (-not $env:SDKROOT) {
            $sdk = (Get-ChildItem "$env:LOCALAPPDATA\Programs\Swift" -Recurse -Filter 'Windows.sdk' `
              -Directory -ErrorAction SilentlyContinue | Select-Object -First 1).FullName
            if ($sdk) { "SDKROOT=$sdk" | Out-File -FilePath $env:GITHUB_ENV -Append; Write-Host "fallback SDKROOT=$sdk" }
          }
      - run: swift --version
      # --scratch-path keeps the build dir short so deep mangled object paths under
      # the runner's checkout cannot trip Windows MAX_PATH (260).
      - name: swift build
        working-directory: ios-app
        run: swift build --scratch-path C:\b
      - name: swift test
        working-directory: ios-app
        run: swift test --scratch-path C:\b

  # --- iOS: build the actual App target so actool compiles the asset catalog --
  #
  # The ios_kit job above only builds/tests the pure CaElevationKit SwiftPM
  # package, so actool never runs and an invalid AppIcon/AccentColor would pass
  # CI undetected. This job generates the Xcode project from project.yml and
  # builds the CaElevationReview App target for the iOS Simulator -- enough to
  # run actool on Assets.xcassets and compile the SwiftUI/ARKit app code.
  #
  # Build-only: the LiDAR/camera capture path returns nil/black frames in the
  # Simulator (no sensors), so we never boot a sim or run on-device tests here.
  ios_app:
    name: CaElevationReview app (macos)
    needs: changes
    if: needs.changes.outputs.ios == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Generate Xcode project
        working-directory: ios-app
        run: xcodegen generate
      - name: Build app target (Simulator; no signing in CI)
        working-directory: ios-app
        # generic/platform=iOS Simulator builds for the simulator SDK without
        # needing a booted device. Signing is disabled because hosted runners
        # have no provisioning profile or identity.
        run: |
          xcodebuild build \
            -project CaElevationReview.xcodeproj \
            -scheme CaElevationReview \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

  # --- Kit <-> engine schema cross-check (GATING) ---------------------------
  #
  # Emit the Swift kit's CapturePackage + SpecManifest samples as JSON (the
  # cek-emit executable + the shared CaElevationFixtures target), then validate
  # them against the AUTHORITATIVE engine JSON Schemas. The kit's own tests only
  # round-trip the encoder against ITSELF; this catches Swift <-> engine-schema
  # drift (required fields, snake_case CodingKeys, the 16-element pose) the
  # moment either side changes. Triggered when EITHER the kit (ios) or the
  # schemas/validator (schema) change. Both producers run on a hosted macOS
  # runner (Swift preinstalled), so it gates with no Swift-on-Windows setup.
  xlang_schema:
    name: "kit <-> schema cross-check"
    needs: changes
    if: needs.changes.outputs.ios == 'true' || needs.changes.outputs.schema == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # jsonschema ONLY (pinned via the engine constraints). Do NOT install the
      # engine here: validate_schemas.py's registered-golden check would then
      # assert the engine's SCENARIO_GOLDENS exist under our kit-samples dir and
      # FAIL. With the engine absent that import fails and the check degrades to
      # a harmless NOTE.
      - name: Install jsonschema (engine-free)
        run: pip install -c engine/requirements-dev.txt jsonschema
      - name: Emit kit samples (Swift encoder -> JSON)
        working-directory: ios-app
        run: swift run cek-emit "$RUNNER_TEMP/kit-samples" kit_sample
      # Fail-closed guard: validate_schemas.py exits 0 on an EMPTY --fixtures dir
      # and --strict-unknown only flags PRESENT-but-misnamed files, so without
      # this the gate could pass having validated nothing.
      - name: Assert both payloads were emitted
        run: |
          test -s "$RUNNER_TEMP/kit-samples/kit_sample.capture.json"
          test -s "$RUNNER_TEMP/kit-samples/kit_sample.manifest.json"
      - name: Validate kit samples against authoritative schemas
        run: python engine/tools/validate_schemas.py --fixtures "$RUNNER_TEMP/kit-samples" --strict-unknown -v

  # --- Revit C# add-in (NON-GATING: Revit API assemblies absent on runners) -
  revit:
    name: revit-addin (windows)
    needs: changes
    if: needs.changes.outputs.revit == 'true'
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      SOLUTION: revit-addin/CaElevationReview.sln
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        continue-on-error: true
        run: dotnet restore "$env:SOLUTION"
      - name: dotnet format (verify)
        continue-on-error: true
        run: dotnet format "$env:SOLUTION" --verify-no-changes
      - name: Build
        continue-on-error: true
        run: dotnet build "$env:SOLUTION" --configuration Release --no-restore
      - name: Test
        continue-on-error: true
        run: dotnet test "$env:SOLUTION" --configuration Release --no-build

  # --- Secret scanning: ALWAYS runs (no change filter) ----------------------
  secret_scan:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  # --- The single required check --------------------------------------------
  all-green:
    name: all-green
    if: always()
    needs: [changes, engine, pyrevit_floor, pyrevit_engine, schema, ios_kit, ios_kit_linux, ios_app, xlang_schema, revit, secret_scan]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Gate on required jobs (success or skipped; revit is non-gating)
        run: |
          declare -A R=(
            [changes]="${{ needs.changes.result }}"
            [engine]="${{ needs.engine.result }}"
            [pyrevit_floor]="${{ needs.pyrevit_floor.result }}"
            [pyrevit_engine]="${{ needs.pyrevit_engine.result }}"
            [schema]="${{ needs.schema.result }}"
            [ios_kit]="${{ needs.ios_kit.result }}"
            [ios_kit_linux]="${{ needs.ios_kit_linux.result }}"
            [ios_app]="${{ needs.ios_app.result }}"
            [xlang_schema]="${{ needs.xlang_schema.result }}"
            [secret_scan]="${{ needs.secret_scan.result }}"
          )
          bad=0
          for k in "${!R[@]}"; do
            v="${R[$k]}"
            if [ "$v" != "success" ] && [ "$v" != "skipped" ]; then
              echo "::error::required job '$k' = $v"
              bad=1
            fi
          done
          if [ "$bad" = 0 ]; then
            echo "All required jobs passed or were skipped (revit-addin is non-gating)."
          fi
          exit $bad
