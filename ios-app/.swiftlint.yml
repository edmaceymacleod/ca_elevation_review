# SwiftLint config for the CA Elevation Review iPhone app.
#
# Lints the pure CaElevationKit library and the SwiftUI/ARKit app layer. Runs in
# CI on macOS and GATES (see the CaElevationKit (macos) job in
# .github/workflows/ci.yml): the tree is kept clean, so any violation fails the
# build (CI runs `swiftlint lint --strict`). Run locally before pushing with:
#   cd ios-app && swiftlint lint --strict --config .swiftlint.yml
# On Windows: pwsh -File scripts/win-swiftlint.ps1 (see ios-app/CLAUDE.md
# "Platform gotchas" — needs LF line endings to match CI).
included:
  - Sources
  - Tests

# Generated/derived dirs never exist in the repo but guard anyway.
excluded:
  - .build
  - DerivedData

# Keep the default rule set; relax a few opinionated rules that fight the
# scaffold's explicit, documentation-heavy style.
disabled_rules:
  - todo # `// TODO:`/`// LIVE:` markers are intentional in the stubs.
  - trailing_comma

line_length:
  warning: 110
  error: 160
  ignores_comments: true

identifier_name:
  # Allow short math/graphics names (x, y, z, u, v, fx, cx, ...).
  min_length: 1
  allowed_symbols: ["_"]

type_name:
  max_length: 50
