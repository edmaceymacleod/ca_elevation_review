# Gitleaks config for CA Elevation Review.
#
# Extends the bundled default ruleset (which covers cloud keys, tokens, private
# keys, etc.) and adds repo-specific allowlists so the local-first, no-secrets
# nature of this project does not trip on fixtures and schema example data.
title = "CA Elevation Review gitleaks config"

[extend]
# Inherit gitleaks' built-in rules; we only add allowlisting below.
useDefault = true

[allowlist]
description = "Repo-specific false-positive allowlist"

paths = [
  # Test fixtures and golden reports contain synthetic ids/poses, not secrets.
  '''engine/fixtures/.*''',
  '''.*\.schema\.json$''',
  # Lockfiles and build outputs.
  '''(^|/)(bin|obj|\.build|DerivedData|dist|build)/''',
]

regexTarget = "line"

regexes = [
  # ARKit poses / affines are arrays of floats, not credentials. Anchor to the
  # numeric-array value shape so a real secret sharing a "pose" line is NOT
  # masked: only suppress when the value is a bracketed list of numbers.
  '''pixel_to_model\s*"?\s*:\s*\[[\s\d.,eE+-]*\]''',
  '''"pose"\s*:\s*\[[\s\d.,eE+-]*\]''',
]
